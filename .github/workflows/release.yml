name: Release (.exe / .apk)

# Builds the Windows installer (Electron) and Android APK (Capacitor) and attaches
# them to the GitHub Release for the current version in package.json.
#
# Required repository secrets:
#   VITE_GOOGLE_CLIENT_ID, VITE_MICROSOFT_CLIENT_ID
#   ANDROID_KEYSTORE_BASE64, ANDROID_STORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
#
# Trigger: manual (workflow_dispatch) or on a pushed tag v*.

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-exe:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read version
        id: ver
        shell: pwsh
        run: |
          $v = (Get-Content package.json | ConvertFrom-Json).version
          "TAG=v$v" >> $env:GITHUB_OUTPUT
          "VERSION=$v" >> $env:GITHUB_OUTPUT
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Build Electron installer
        run: npm run electron:build:ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_MICROSOFT_CLIENT_ID: ${{ secrets.VITE_MICROSOFT_CLIENT_ID }}
      - name: Upload .exe to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.ver.outputs.TAG }}"
          $exe = Get-ChildItem -Recurse release -Filter "*.exe" |
            Where-Object { $_.Name -notlike "*unpacked*" } | Select-Object -First 1
          gh release create $tag --title "Release $tag" --generate-notes --repo ${{ github.repository }} 2>$null
          gh release upload $tag $exe.FullName --clobber --repo ${{ github.repository }}

  build-apk:
    name: Android (.apk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read version
        id: ver
        run: |
          VER=$(node -p "require('./package.json').version")
          echo "TAG=v$VER" >> $GITHUB_OUTPUT
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install Java 21
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-21-jdk
          JAVA21_HOME=$(find /usr/lib/jvm -maxdepth 1 -name "java-21*" -type d | head -1)
          echo "JAVA_HOME=$JAVA21_HOME" >> $GITHUB_ENV
          echo "$JAVA21_HOME/bin" >> $GITHUB_PATH
      - run: npm ci --legacy-peer-deps
      - name: Build web + Capacitor sync
        run: npm run build && npx cap sync android
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_MICROSOFT_CLIENT_ID: ${{ secrets.VITE_MICROSOFT_CLIENT_ID }}
      - name: Decode release keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/release.keystore
      - name: Build release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: chmod +x gradlew && ./gradlew assembleRelease
      - name: Upload .apk to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.TAG }}"
          DEST="taxtoo-${TAG}.apk"
          mv android/app/build/outputs/apk/release/app-release.apk "$DEST"
          gh release create "$TAG" --title "Release $TAG" --generate-notes --repo ${{ github.repository }} 2>/dev/null || true
          gh release upload "$TAG" "$DEST" --clobber --repo ${{ github.repository }}
